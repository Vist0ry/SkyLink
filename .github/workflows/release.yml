name: Release

on:
  push:
    tags:
      - '[0-9]*'
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build SkyLink.exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare .env for CI build
        run: Copy-Item .env.example .env

      - name: Build executable
        run: python build.py

      - name: Check SignPath variables
        shell: pwsh
        run: |
          $orgFromVar = '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          if ([string]::IsNullOrWhiteSpace($orgFromVar)) {
            Write-Host '::warning::SIGNPATH_ORGANIZATION_ID variable is empty.'
            Write-Host 'If you added Organization ID as a Secret, the updated workflow will use it in the Sign job.'
          } else {
            Write-Host 'SIGNPATH_ORGANIZATION_ID variable is set.'
          }
          Write-Host "PROJECT_SLUG=${{ vars.SIGNPATH_PROJECT_SLUG || 'SkyLink' }}"
          Write-Host "POLICY_SLUG=${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'release-signing' }}"

      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: skylink-unsigned
          path: dist/SkyLink.exe
          if-no-files-found: error

  sign:
    name: Sign with SignPath
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: skylink-unsigned
          path: dist

      - name: Upload artifact for SignPath
        id: upload-for-signpath
        uses: actions/upload-artifact@v4
        with:
          name: skylink-signpath-input
          path: dist/SkyLink.exe
          if-no-files-found: error

      - name: Resolve SignPath organization id
        id: signpath
        shell: bash
        run: |
          if [ -n "${{ vars.SIGNPATH_ORGANIZATION_ID }}" ]; then
            echo "org_id=${{ vars.SIGNPATH_ORGANIZATION_ID }}" >> "$GITHUB_OUTPUT"
          else
            echo "org_id=${{ secrets.SIGNPATH_ORGANIZATION_ID }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit signing request
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ steps.signpath.outputs.org_id }}'
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG || 'SkyLink' }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG || 'release-signing' }}
          github-artifact-id: '${{ steps.upload-for-signpath.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: skylink-signed
          path: signed/SkyLink.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build, sign]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.sign.result == 'success' || needs.sign.result == 'failure' || needs.sign.result == 'skipped')
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.sign.result == 'success' && 'skylink-signed' || 'skylink-unsigned' }}
          path: release

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SkyLink ${{ steps.version.outputs.value }}
          tag_name: ${{ github.ref_name }}
          files: release/SkyLink.exe
          generate_release_notes: true
